<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Note</title>
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    /* macOS Stickies palette */
    --yellow:     #FFF9C4;
    --yellow-bar: #F9E97A;
    --blue:       #BBDEFB;
    --blue-bar:   #7FB3E0;
    --green:      #C8E6C9;
    --green-bar:  #8CC98F;
    --pink:       #F8BBD0;
    --pink-bar:   #E88FAB;
    --purple:     #E1BEE7;
    --purple-bar: #C48DD0;
    --gray:       #E0E0E0;
    --gray-bar:   #B8B8B8;

    --bg: var(--yellow);
    --bar: var(--yellow-bar);
    --text: #3E3A2E;
    --text-muted: rgba(62, 58, 46, 0.4);
    --radius: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Note Container ───────────────────────────────── */
  .note {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: background 0.3s ease;
  }

  /* ── Title Bar (draggable) ────────────────────────── */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 32px;
    min-height: 32px;
    padding: 0 8px;
    background: var(--bar);
    cursor: grab;
    transition: background 0.3s ease;
  }

  .titlebar:active { cursor: grabbing; }

  .titlebar-left, .titlebar-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Toolbar Buttons ──────────────────────────────── */
  .btn {
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.08);
    color: var(--text);
    font-size: 11px;
    line-height: 1;
    transition: background 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
  }

  .btn:hover {
    background: rgba(0,0,0,0.16);
    transform: scale(1.1);
  }

  .btn:active { transform: scale(0.95); }

  .btn-close {
    background: rgba(0,0,0,0.06);
  }
  .btn-close:hover {
    background: #FF5F57;
    color: white;
  }

  .btn-pin.active {
    background: rgba(0,0,0,0.22);
    transform: rotate(-45deg);
  }
  .btn-pin.active:hover {
    background: rgba(0,0,0,0.28);
  }

  .btn svg {
    width: 12px;
    height: 12px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
  }

  /* ── Color Picker ─────────────────────────────────── */
  .color-picker {
    display: none;
    position: absolute;
    top: 36px;
    right: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 8px;
    gap: 6px;
    flex-wrap: wrap;
    width: 90px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 100;
    -webkit-app-region: no-drag;
  }

  .color-picker.open { display: flex; }

  .color-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: rgba(0,0,0,0.4); }

  .color-dot[data-color="yellow"]  { background: var(--yellow-bar); }
  .color-dot[data-color="blue"]    { background: var(--blue-bar); }
  .color-dot[data-color="green"]   { background: var(--green-bar); }
  .color-dot[data-color="pink"]    { background: var(--pink-bar); }
  .color-dot[data-color="purple"]  { background: var(--purple-bar); }
  .color-dot[data-color="gray"]    { background: var(--gray-bar); }

  /* ── Text Area ────────────────────────────────────── */
  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .lines {
    display: none;
  }

  .editor {
    width: 100%;
    height: 100%;
    padding: 12px 16px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: normal;
    user-select: text;
    -webkit-user-select: text;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
  }

  .editor div { margin-bottom: 4px; }


  .editor:empty::before {
    content: 'メモを入力…';
    color: var(--text-muted);
    pointer-events: none;
  }

  /* ── Markdown Preview ─────────────────────────────── */
  .markdown-view {
    display: none;
    position: absolute;
    inset: 0;
    padding: 12px 16px;
    overflow-y: auto;
    cursor: text;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    user-select: text;
    -webkit-user-select: text;
  }

  .markdown-view.active { display: block; }

  .md-placeholder { color: var(--text-muted); }
  .md-line, .md-empty { min-height: 21px; word-break: break-word; }
  .md-h1 { font-size: 17px; font-weight: 700; line-height: 1.4; margin: 4px 0 2px; }
  .md-h2 { font-size: 15px; font-weight: 600; line-height: 1.4; margin: 3px 0 1px; }
  .md-h3 { font-size: 14px; font-weight: 600; line-height: 1.4; margin: 2px 0 1px; }

  .md-bullet { position: relative; min-height: 21px; padding-left: 14px; }
  .md-bullet::before { content: '•'; position: absolute; left: 2px; }

  .md-check {
    position: relative;
    min-height: 21px;
    padding-left: 18px;
    word-break: break-word;
  }
  .md-check::before {
    content: '☐';
    position: absolute;
    left: 0;
    font-size: 1em;
  }
  .md-check.checked::before {
    content: '☑';
  }
  .md-check input[type="checkbox"] {
    position: absolute;
    left: 0;
    top: 0;
    width: 16px;
    height: 16px;
    opacity: 0;
    cursor: pointer;
    z-index: 1;
  }
  .md-check.checked span { text-decoration: line-through; opacity: 0.45; }

  .md-blockquote {
    border-left: 3px solid var(--text-muted);
    padding-left: 10px;
    color: var(--text-muted);
    min-height: 21px;
    word-break: break-word;
  }

  .md-hr {
    border: none;
    border-top: 1px solid var(--text-muted);
    margin: 6px 0;
  }

  .md-ordered {
    position: relative;
    min-height: 21px;
    padding-left: 1.8em;
    word-break: break-word;
  }
  .md-order-num {
    position: absolute;
    left: 0;
  }

  .markdown-view code {
    background: rgba(0,0,0,0.06);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.9em;
  }

  .md-codeblock {
    background: rgba(0,0,0,0.06);
    border-radius: 6px;
    padding: 8px 12px;
    margin: 4px 0;
    overflow-x: auto;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    line-height: 1.4;
    white-space: pre;
  }
  .md-codeblock code {
    background: none;
    border-radius: 0;
    padding: 0;
    font-size: inherit;
  }

  .markdown-view a {
    color: #1565C0;
    text-decoration: underline;
    text-decoration-color: rgba(21, 101, 192, 0.4);
    cursor: pointer;
  }
  .markdown-view a:hover {
    text-decoration-color: rgba(21, 101, 192, 0.8);
  }

  /* ── Resize Handle ────────────────────────────────── */
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .resize-handle:hover { opacity: 0.6; }

  .resize-handle::before,
  .resize-handle::after {
    content: '';
    position: absolute;
    background: var(--text);
    border-radius: 1px;
  }
  /* ── Focus Indicator ──────────────────────────────── */
  .btn:focus-visible,
  .color-dot:focus-visible {
    outline: 2px solid rgba(0, 102, 204, 0.6);
    outline-offset: 2px;
  }

  .resize-handle::before {
    width: 8px; height: 1.5px;
    bottom: 4px; right: 2px;
    transform: rotate(-45deg);
  }
  .resize-handle::after {
    width: 5px; height: 1.5px;
    bottom: 3px; right: 1px;
    transform: rotate(-45deg);
  }
</style>
</head>
<body>
  <div class="note" id="note">
    <!-- Titlebar -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-left">
        <button class="btn btn-close" id="btn-delete" title="削除">
          <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
        </button>
      </div>
      <div class="titlebar-right">
        <button class="btn" id="btn-new" title="新しい付箋">
          <svg viewBox="0 0 12 12"><line x1="6" y1="2" x2="6" y2="10"/><line x1="2" y1="6" x2="10" y2="6"/></svg>
        </button>
        <button class="btn btn-pin" id="btn-pin" title="ピン留め" aria-label="ピン留め" aria-pressed="false">
          <svg viewBox="0 0 12 12"><path d="M6 11V7M3.5 7h5l-.7-2.5H4.2L3.5 7ZM4.5 4.5V2.2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5V4.5" fill="none"/></svg>
        </button>
        <button class="btn" id="btn-color" title="色">
          <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </div>

    <!-- Color Picker -->
    <div class="color-picker" id="color-picker" role="radiogroup" aria-label="付箋の色">
      <div class="color-dot" data-color="yellow" role="radio" aria-label="イエロー" aria-checked="false" tabindex="0"></div>
      <div class="color-dot" data-color="blue" role="radio" aria-label="ブルー" aria-checked="false" tabindex="-1"></div>
      <div class="color-dot" data-color="green" role="radio" aria-label="グリーン" aria-checked="false" tabindex="-1"></div>
      <div class="color-dot" data-color="pink" role="radio" aria-label="ピンク" aria-checked="false" tabindex="-1"></div>
      <div class="color-dot" data-color="purple" role="radio" aria-label="パープル" aria-checked="false" tabindex="-1"></div>
      <div class="color-dot" data-color="gray" role="radio" aria-label="グレー" aria-checked="false" tabindex="-1"></div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="lines" id="lines"></div>
      <div class="markdown-view" id="markdown-view" role="document" aria-label="プレビュー"></div>
      <div class="editor" id="editor" contenteditable="true" aria-label="付箋の内容"></div>
    </div>
  </div>


<script src="markdown.js"></script>
<script>
  // ── Globals ───────────────────────────────────────
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;
  const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
  const appWindow = getCurrentWebviewWindow();

  const params = new URLSearchParams(window.location.search);
  const noteId = params.get('id');

  const editor    = document.getElementById('editor');
  const noteEl    = document.getElementById('note');
  const titlebar  = document.getElementById('titlebar');
  const picker    = document.getElementById('color-picker');
  const mdView    = document.getElementById('markdown-view');
  const pinBtn    = document.getElementById('btn-pin');
  const newBtn    = document.getElementById('btn-new');
  const colorBtn  = document.getElementById('btn-color');

  let saveTimer = null;
  let currentSettings = null;
  let rawContent = '';

  // ── Apply Settings to UI ─────────────────────────
  function applySettings(s) {
    currentSettings = s;
    editor.style.fontSize = `${s.font_size}px`;
    noteEl.style.opacity = (s.opacity ?? 100) / 100;
    pinBtn.style.display = s.show_pin_button === false ? 'none' : '';
    newBtn.style.display = s.show_new_button === false ? 'none' : '';
    colorBtn.style.display = s.show_color_button === false ? 'none' : '';
  }

  // ── Toggle Pin State ────────────────────────────
  function applyPinState(isPinned) {
    pinBtn.classList.toggle('active', isPinned);
    pinBtn.setAttribute('aria-pressed', String(isPinned));
    const label = isPinned ? 'ピン留め解除' : 'ピン留め';
    pinBtn.title = label;
    pinBtn.setAttribute('aria-label', label);
  }

  async function togglePin() {
    const isPinned = !pinBtn.classList.contains('active');
    applyPinState(isPinned);
    try {
      await appWindow.setAlwaysOnTop(isPinned);
      await invoke('update_note_pinned', { id: noteId, pinned: isPinned });
    } catch (e) {
      console.error('togglePin failed:', e);
      applyPinState(!isPinned); // 失敗時はUI を元に戻す
    }
  }

  // ── Apply Color Theme ─────────────────────────────
  let currentColor = 'yellow';

  const VALID_COLORS = ['yellow','blue','green','pink','purple','gray'];

  function applyColor(color) {
    if (!VALID_COLORS.includes(color)) color = 'yellow';
    currentColor = color;
    noteEl.style.setProperty('--bg',  `var(--${color})`);
    noteEl.style.setProperty('--bar', `var(--${color}-bar)`);

    document.querySelectorAll('.color-dot').forEach(d => {
      const selected = d.dataset.color === color;
      d.classList.toggle('active', selected);
      d.setAttribute('aria-checked', String(selected));
      d.setAttribute('tabindex', selected ? '0' : '-1');
    });
    document.querySelectorAll('.cm-color-dot').forEach(d => {
      const selected = d.dataset.color === color;
      d.classList.toggle('active', selected);
      d.setAttribute('aria-checked', String(selected));
      d.setAttribute('tabindex', selected ? '0' : '-1');
    });
  }

  // ── Load Note Data ────────────────────────────────
  async function loadNote() {
    let note, settings;
    try {
      [note, settings] = await Promise.all([
        invoke('get_note', { id: noteId }),
        invoke('get_settings'),
      ]);
    } catch (e) {
      console.error('loadNote failed:', e);
      return;
    }
    if (!note) {
      console.error('Note not found, closing window:', noteId);
      appWindow.close();
      return;
    }

    rawContent = note.content;
    editor.innerText = rawContent;
    applyColor(note.color);

    if (settings) {
      applySettings(settings);
    }
    // Apply pinned state
    applyPinState(!!note.pinned);
    if (note.pinned) {
      appWindow.setAlwaysOnTop(true);
    }
    // Apply per-note zoom
    currentZoom = note.zoom ?? 100;
    applyZoom(currentZoom);
    showPreview();
  }

  function showPreview() {
    mdView.innerHTML = renderMarkdown(rawContent);
    mdView.classList.add('active');
    editor.style.display = 'none';
  }

  function showEditor(caretOffset) {
    mdView.classList.remove('active');
    editor.style.display = '';
    editor.focus();
    if (caretOffset != null) {
      try {
        // Walk text nodes to find the right position
        let remaining = caretOffset;
        const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          if (remaining <= node.textContent.length) {
            const sel = window.getSelection();
            const range = document.createRange();
            range.setStart(node, remaining);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
            return;
          }
          remaining -= node.textContent.length;
        }
      } catch (e) { /* fallback: cursor at start */ }
    }
  }

  const MD_PATTERNS = [
    /^#{1,3} /m,              // heading
    /^[-*] /m,                // bullet list
    /^> /m,                   // blockquote
    /^\d+\. /m,               // ordered list
    /^[-*_]{3,}$/m,           // horizontal rule
    /\*\*/,                   // bold (**)
    /(?<!\w)__[^\s_].*?__/,   // bold (__)
    /(?<![*\w])\*(?![\s*])/,  // italic
    /~~/,                     // strikethrough
    /`[^`]/,                  // inline code
    /!\[/,                    // image
    /\[.+?\]\(.+?\)/,        // link
  ];

  function hasMarkdownSyntax(text) {
    return MD_PATTERNS.some(r => r.test(text));
  }

  function getCaretOffsetFromEvent(e) {
    // Find which top-level child of mdView was clicked
    const children = Array.from(mdView.children);
    const target = e.target.closest('.markdown-view > *') || e.target;
    const lineIdx = children.indexOf(target);
    if (lineIdx < 0) return 0;
    // Sum lengths of rawContent lines up to lineIdx
    const lines = rawContent.split('\n');
    let offset = 0;
    for (let i = 0; i < Math.min(lineIdx, lines.length); i++) {
      offset += lines[i].length + 1; // +1 for \n
    }
    return offset;
  }

  // Click on preview: links/checkboxes handled, then edit mode logic
  mdView.addEventListener('click', (e) => {
    const link = e.target.closest('a[data-url]');
    if (link) {
      e.preventDefault();
      window.__TAURI__.shell.open(link.dataset.url);
      return;
    }
    if (e.target.closest('input[type="checkbox"]')) return;
    // Always single-click for empty/plain text notes
    if (!rawContent || !hasMarkdownSyntax(rawContent)) {
      showEditor(getCaretOffsetFromEvent(e));
      return;
    }
    // Markdown notes: single-click if setting enabled
    if (currentSettings?.edit_on_single_click) {
      showEditor(getCaretOffsetFromEvent(e));
    }
  });

  // Double-click on preview → edit mode (always works)
  mdView.addEventListener('dblclick', (e) => {
    if (!e.target.closest('input[type="checkbox"]') && !e.target.closest('a[data-url]')) {
      showEditor(getCaretOffsetFromEvent(e));
    }
  });

  // Blur textarea → preview mode
  editor.addEventListener('blur', (e) => {
    // Don't switch if focus moves to a button (color picker, etc.) or context menu is open
    if (e.relatedTarget && e.relatedTarget.closest('.note')) return;
    // (native context menu is handled by OS, no check needed)
    showPreview();
  });

  // Checkbox toggle
  mdView.addEventListener('change', (e) => {
    if (e.target.type !== 'checkbox') return;
    const lineIdx = parseInt(e.target.dataset.line, 10);
    const lines = rawContent.split('\n');
    if (e.target.checked) {
      lines[lineIdx] = lines[lineIdx].replace(/^(\s*)([-*] )\[ \] /, '$1$2[x] ');
    } else {
      lines[lineIdx] = lines[lineIdx].replace(/^(\s*)([-*] )\[x\] /i, '$1$2[ ] ');
    }
    rawContent = lines.join('\n');
    editor.innerText = rawContent;
    invoke('update_note_content', { id: noteId, content: rawContent }).catch(e => console.error('save failed:', e));
    mdView.innerHTML = renderMarkdown(rawContent);
  });

  // ── Zoom ──────────────────────────────────────────
  function applyZoom(zoom) {
    document.getElementById('note').style.zoom = zoom / 100;
  }

  let currentZoom = 100;

  async function changeZoom(delta) {
    const next = Math.max(50, Math.min(200, currentZoom + delta * 10));
    if (next === currentZoom) return;
    currentZoom = next;
    applyZoom(next);
    invoke('update_note_zoom', { id: noteId, zoom: next }).catch(e => console.error('save failed:', e));
  }

  // ── Markdown auto-continue on Enter ─────────────
  const LIST_PATTERNS = [
    { re: /^(- \[[ xX]\] )(.*)$/, prefix: (m) => '- [ ] ' },     // checkbox
    { re: /^([-*] )(?!\[[ xX]\] )(.*)$/, prefix: (m) => m[1] },   // bullet
    { re: /^(\d+)\. (.*)$/,      prefix: (m) => `${+m[1] + 1}. ` }, // ordered
    { re: /^(> )(.*)$/,          prefix: (m) => '> ' },          // blockquote
  ];

  /**
   * Return the prefix to auto-insert on the next line, or null if
   * the line is not a list/quote that should be continued.
   */
  function stripIndent(line) {
    const indent = line.match(/^( *)/)[1];
    return { indent, stripped: line.slice(indent.length) };
  }

  function getAutoPrefix(lineText) {
    const { indent, stripped } = stripIndent(lineText);
    for (const pat of LIST_PATTERNS) {
      const m = stripped.match(pat.re);
      if (m) return indent + pat.prefix(m);
    }
    return null;
  }

  /**
   * Return true if the line is an empty list item / blockquote
   * (i.e. prefix only, no content) that should be cancelled on Enter.
   */
  function isEmptyListItem(lineText) {
    const { stripped } = stripIndent(lineText);
    for (const pat of LIST_PATTERNS) {
      const m = stripped.match(pat.re);
      if (!m) continue;
      const content = m[2];
      return !content.trim();
    }
    return false;
  }

  function getCurrentLine() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return null;
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE) return null;
    const full = node.textContent;
    const pos = range.startOffset;
    const before = full.slice(0, pos);
    const after = full.slice(pos);
    const lastNl = before.lastIndexOf('\n');
    const nextNl = after.indexOf('\n');
    const lineAfter = nextNl >= 0 ? after.slice(0, nextNl) : after;
    const fullLine = before.slice(lastNl + 1) + lineAfter;
    return { text: before.slice(lastNl + 1), fullLine, node, pos };
  }

  let autoInsertGuard = false;
  editor.addEventListener('beforeinput', (e) => {
    if (e.inputType !== 'insertParagraph' || autoInsertGuard) return;

    const cur = getCurrentLine();
    if (!cur) return;

    // Use fullLine for pattern matching (works at beginning/middle/end of line)
    const prefix = getAutoPrefix(cur.fullLine);
    if (prefix === null) return;

    // Don't auto-continue if caret is before or inside the prefix portion
    const { indent, stripped } = stripIndent(cur.fullLine);
    for (const pat of LIST_PATTERNS) {
      const m = stripped.match(pat.re);
      if (m) {
        const prefixEnd = indent.length + m[1].length;
        if (cur.text.length < prefixEnd) return;
        break;
      }
    }

    e.preventDefault();
    autoInsertGuard = true;

    try {
      if (isEmptyListItem(cur.fullLine)) {
        // Empty list item → remove prefix and insert plain newline
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        const lineStart = cur.pos - cur.text.length;
        const lineEnd = Math.min(lineStart + cur.fullLine.length, cur.node.textContent.length);
        range.setStart(cur.node, lineStart);
        range.setEnd(cur.node, lineEnd);
        range.deleteContents();
        document.execCommand('insertText', false, '\n');
      } else {
        const afterCaret = cur.fullLine.slice(cur.text.length);
        if (afterCaret.length > 0) {
          // Select text after caret to end of line, then replace it
          const sel = window.getSelection();
          const range = sel.getRangeAt(0);
          const lineEnd = cur.pos + afterCaret.length;
          range.setEnd(cur.node, Math.min(lineEnd, cur.node.textContent.length));
          sel.removeAllRanges();
          sel.addRange(range);
          const trimmed = afterCaret.replace(/^ /, '');
          document.execCommand('insertText', false, '\n' + prefix + trimmed);
        } else {
          document.execCommand('insertText', false, '\n' + prefix);
        }
      }
    } finally {
      autoInsertGuard = false;
    }
  });

  // ── Tab / Shift+Tab indent ──────────────────────
  editor.addEventListener('keydown', (e) => {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const cur = getCurrentLine();
    if (!cur) return;
    const sel = window.getSelection();
    const nodeLen = cur.node.textContent.length;
    // getCurrentLine().pos is the caret offset within the text node,
    // and .text is the substring from the last newline to pos (i.e. current line before caret).
    // lineStart = pos - text.length gives the offset of the current line's first character.
    const lineStart = Math.min(Math.max(0, cur.pos - cur.text.length), nodeLen);

    // Guard: lineStart must be a valid offset within the text node
    if (lineStart < 0 || lineStart > nodeLen) return;

    if (e.shiftKey) {
      // Remove up to 2 spaces from line start
      const full = cur.node.textContent;
      let removeCount = 0;
      if (lineStart + 1 <= full.length && full[lineStart] === ' ' && full[lineStart + 1] === ' ') removeCount = 2;
      else if (lineStart < full.length && full[lineStart] === ' ') removeCount = 1;
      if (removeCount > 0 && lineStart + removeCount <= nodeLen) {
        try {
          const range = document.createRange();
          range.setStart(cur.node, lineStart);
          range.setEnd(cur.node, lineStart + removeCount);
          sel.removeAllRanges();
          sel.addRange(range);
          document.execCommand('delete');
          // Restore cursor position
          const updatedLen = cur.node.textContent.length;
          const newPos = Math.min(Math.max(lineStart, cur.pos - removeCount), updatedLen);
          const r = document.createRange();
          r.setStart(cur.node, newPos);
          r.collapse(true);
          sel.removeAllRanges();
          sel.addRange(r);
        } catch (err) { console.warn('Tab indent: range operation failed', err); }
      }
    } else {
      // Insert 2 spaces at line start
      try {
        const range = document.createRange();
        range.setStart(cur.node, lineStart);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('insertText', false, '  ');
        // Restore cursor position (shifted by 2)
        const updatedLen = cur.node.textContent.length;
        const newPos = Math.min(cur.pos + 2, updatedLen);
        const r = document.createRange();
        r.setStart(cur.node, newPos);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);
      } catch (err) { console.warn('Tab indent: range operation failed', err); }
    }
  });

  // ── Paste: rich text links → markdown, otherwise plain ──
  function htmlToMarkdown(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    let result = '';
    for (const node of doc.body.childNodes) {
      result += nodeToMd(node);
    }
    return result;
  }

  function nodeToMd(node) {
    if (node.nodeType === Node.TEXT_NODE) return node.textContent;
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    const tag = node.tagName.toLowerCase();
    // Strip script/style tags entirely — their text content is never useful
    if (tag === 'script' || tag === 'style') return '';
    const inner = Array.from(node.childNodes).map(nodeToMd).join('');
    switch (tag) {
      case 'a': {
        const href = node.getAttribute('href') || '';
        if (!href || /^javascript:/i.test(href)) return inner;
        return `[${inner.trim() || href}](${href})`;
      }
      case 'strong': case 'b':  return inner ? `**${inner}**` : '';
      case 'em': case 'i':      return inner ? `*${inner}*` : '';
      case 'del': case 's':     return inner ? `~~${inner}~~` : '';
      case 'code':               return inner ? `\`${inner}\`` : '';
      case 'h1':                 return inner ? `# ${inner}\n` : '';
      case 'h2':                 return inner ? `## ${inner}\n` : '';
      case 'h3':                 return inner ? `### ${inner}\n` : '';
      case 'blockquote':         return inner ? inner.split('\n').filter(l => l).map(l => `> ${l}`).join('\n') + '\n' : '';
      case 'ul': case 'ol':     return inner;
      case 'li': {
        const parent = node.parentElement?.tagName.toLowerCase();
        if (parent === 'ol') {
          const idx = Array.from(node.parentElement.children).indexOf(node) + 1;
          return `${idx}. ${inner}\n`;
        }
        return `- ${inner}\n`;
      }
      case 'br':                 return '\n';
      case 'p': case 'div':     return inner + '\n';
      default:                   return inner;
    }
  }

  editor.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    const html = e.clipboardData.getData('text/html');
    const sel = window.getSelection();
    const selected = sel.toString();

    // 選択テキスト + URL → markdown link
    if (selected && /^https?:\/\/\S+$/.test(text.trim())) {
      document.execCommand('insertText', false, `[${selected}](${text.trim()})`);
      return;
    }

    // リッチテキストが含まれていれば markdown 変換
    if (html && /<(?:a|strong|b|em|i|del|s|code|h[1-3]|blockquote|[uo]l|li)\b/i.test(html)) {
      const md = htmlToMarkdown(html);
      document.execCommand('insertText', false, md);
      return;
    }

    // それ以外はプレーンテキスト
    document.execCommand('insertText', false, text);
  });

  // ── Checkbox autocomplete ────────────────────────
  const CHECKBOX_RE = /^([-*])\s?\[([xX]?)\]$/;

  function autocompleteCheckbox() {
    const cur = getCurrentLine();
    if (!cur) return;
    const m = cur.text.match(CHECKBOX_RE);
    if (!m) return;
    const bullet = m[1];
    const inner = m[2].toLowerCase();
    const replacement = inner === 'x' ? `${bullet} [x] ` : `${bullet} [ ] `;

    // Replace current line text in the text node
    const lineStart = cur.pos - cur.text.length;
    const sel = window.getSelection();
    const range = document.createRange();
    range.setStart(cur.node, lineStart);
    range.setEnd(cur.node, cur.pos);
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('insertText', false, replacement);
  }

  editor.addEventListener('input', (e) => {
    if (!e.isComposing && e.data === ']') {
      autocompleteCheckbox();
    }
  });

  // ── Auto-Save Content ─────────────────────────────
  editor.addEventListener('input', () => {
    rawContent = editor.innerText.replace(/\u00A0/g, ' ');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      invoke('update_note_content', { id: noteId, content: rawContent }).catch(e => console.error('save failed:', e));
    }, 300);
  });

  // ── Drag Window ───────────────────────────────────
  let dragging = false;
  let dragTimeout = null;
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.btn') || e.target.closest('.color-picker')) return;
    dragging = true;
    appWindow.startDragging();
    // Fallback: clear flag after 5s in case mouseup is consumed by startDragging
    clearTimeout(dragTimeout);
    dragTimeout = setTimeout(() => { dragging = false; }, 5000);
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  // ── Save Position/Size on Move & Resize ───────────
  let geoTimer = null;
  function scheduleGeoSave() {
    clearTimeout(geoTimer);
    geoTimer = setTimeout(async () => {
      try {
        const pos  = await appWindow.outerPosition();
        const size = await appWindow.outerSize();
        invoke('update_note_geometry', {
          id: noteId,
          x: pos.x,
          y: pos.y,
          width: size.width,
          height: size.height,
        }).catch(e => console.error('save failed:', e));
      } catch (e) {
        // Window might be closing
      }
    }, 500);
  }

  unlisteners.push(appWindow.onMoved(() => scheduleGeoSave()));
  unlisteners.push(appWindow.onResized(() => scheduleGeoSave()));

  // ── Buttons ───────────────────────────────────────
  newBtn.addEventListener('click', () => {
    invoke('create_note').catch(e => console.error('create note failed:', e));
  });

  document.getElementById('btn-delete').addEventListener('click', () => {
    invoke('delete_note', { id: noteId }).catch(e => console.error('delete failed:', e));
  });

  colorBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    picker.classList.toggle('open');
  });

  // Color dots
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const color = dot.dataset.color;
      applyColor(color);
      invoke('update_note_color', { id: noteId, color }).catch(e => console.error('save failed:', e));
      picker.classList.remove('open');
    });
  });

  // ── Pin Button ──────────────────────────────────────
  pinBtn.addEventListener('click', togglePin);

  // Close picker on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#color-picker') && !e.target.closest('#btn-color')) {
      picker.classList.remove('open');
    }
  });

  // ── Zoom Shortcuts (⌘+ / ⌘- / ⌘0) ───────────────
  function resetZoom() {
    currentZoom = 100;
    applyZoom(100);
    invoke('update_note_zoom', { id: noteId, zoom: 100 }).catch(e => console.error('save failed:', e));
  }

  // Listen for zoom events from app menu (only apply to focused window)
  const unlisteners = [];
  unlisteners.push(listen('zoom', (e) => {
    if (!document.hasFocus()) return;
    if (e.payload === 'in') changeZoom(+1);
    else if (e.payload === 'out') changeZoom(-1);
    else if (e.payload === 'reset') resetZoom();
  }));

  // Listen for context menu events (targeted to this window via emit_to)
  unlisteners.push(appWindow.listen('ctx-toggle-pin', () => togglePin()));
  unlisteners.push(appWindow.listen('ctx-zoom', (e) => {
    if (e.payload === 'in') changeZoom(+1);
    else if (e.payload === 'out') changeZoom(-1);
    else if (e.payload === 'reset') resetZoom();
  }));
  // Rust has already saved the color; only update the UI here
  unlisteners.push(appWindow.listen('ctx-apply-color', (e) => applyColor(e.payload)));

  // ── Listen for settings changes ──────────────────
  unlisteners.push(listen('settings-changed', (e) => {
    applySettings(e.payload);
  }));

  // ── Cleanup on window close ──────────────────────
  window.addEventListener('beforeunload', () => {
    unlisteners.forEach(p => p.then(fn => fn()));
  });

  // ── Context Menu (native via Tauri) ──────────────────
  document.addEventListener('contextmenu', (e) => {
    if (e.shiftKey) return;
    e.preventDefault();
    invoke('show_context_menu', {
      id: noteId,
      isPinned: pinBtn.classList.contains('active'),
      currentColor: currentColor,
    }).catch(e => console.error('context menu failed:', e));
  });

  // ── Expose for Playwright tests ──────────────────────
  window.htmlToMarkdown = htmlToMarkdown;
  window.hasMarkdownSyntax = hasMarkdownSyntax;
  window.getAutoPrefix = getAutoPrefix;
  window.isEmptyListItem = isEmptyListItem;
  window.renderMarkdown = renderMarkdown;
  window.CHECKBOX_RE = CHECKBOX_RE;
  window.applyColor = applyColor;
  window.changeZoom = changeZoom;
  window.resetZoom = resetZoom;
  window.togglePin = togglePin;


  // ── Keyboard: color dots (Enter/Space/Arrow) ───────
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        dot.click();
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        const group = [...dot.parentElement.querySelectorAll('[role="radio"]')];
        const idx = group.indexOf(dot);
        const next = e.key === 'ArrowRight'
          ? group[(idx + 1) % group.length]
          : group[(idx - 1 + group.length) % group.length];
        dot.setAttribute('tabindex', '-1');
        next.setAttribute('tabindex', '0');
        next.focus();
      }
    });
  });

  // ── ⌘W to close window ─────────────────────────────
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'w') {
      e.preventDefault();
      getCurrentWebviewWindow().close();
    }
  });

  // ── Init ──────────────────────────────────────────
  loadNote();
</script>
</body>
</html>
