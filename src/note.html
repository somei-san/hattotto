<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Note</title>
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    /* macOS Stickies palette */
    --yellow:     #FFF9C4;
    --yellow-bar: #F9E97A;
    --blue:       #BBDEFB;
    --blue-bar:   #7FB3E0;
    --green:      #C8E6C9;
    --green-bar:  #8CC98F;
    --pink:       #F8BBD0;
    --pink-bar:   #E88FAB;
    --purple:     #E1BEE7;
    --purple-bar: #C48DD0;
    --gray:       #E0E0E0;
    --gray-bar:   #B8B8B8;

    --bg: var(--yellow);
    --bar: var(--yellow-bar);
    --text: #3E3A2E;
    --text-muted: rgba(62, 58, 46, 0.4);
    --radius: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Note Container ───────────────────────────────── */
  .note {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: background 0.3s ease;
  }

  /* ── Title Bar (draggable) ────────────────────────── */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 32px;
    min-height: 32px;
    padding: 0 8px;
    background: var(--bar);
    cursor: grab;
    transition: background 0.3s ease;
  }

  .titlebar:active { cursor: grabbing; }

  .titlebar-left, .titlebar-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Toolbar Buttons ──────────────────────────────── */
  .btn {
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.08);
    color: var(--text);
    font-size: 11px;
    line-height: 1;
    transition: background 0.15s, transform 0.1s;
    -webkit-app-region: no-drag;
  }

  .btn:hover {
    background: rgba(0,0,0,0.16);
    transform: scale(1.1);
  }

  .btn:active { transform: scale(0.95); }

  .btn-close {
    background: rgba(0,0,0,0.06);
  }
  .btn-close:hover {
    background: #FF5F57;
    color: white;
  }

  .btn svg {
    width: 12px;
    height: 12px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
  }

  /* ── Color Picker ─────────────────────────────────── */
  .color-picker {
    display: none;
    position: absolute;
    top: 36px;
    right: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 8px;
    gap: 6px;
    display: none;
    flex-wrap: wrap;
    width: 90px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 100;
    -webkit-app-region: no-drag;
  }

  .color-picker.open { display: flex; }

  .color-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: rgba(0,0,0,0.4); }

  .color-dot[data-color="yellow"]  { background: var(--yellow-bar); }
  .color-dot[data-color="blue"]    { background: var(--blue-bar); }
  .color-dot[data-color="green"]   { background: var(--green-bar); }
  .color-dot[data-color="pink"]    { background: var(--pink-bar); }
  .color-dot[data-color="purple"]  { background: var(--purple-bar); }
  .color-dot[data-color="gray"]    { background: var(--gray-bar); }

  /* ── Text Area ────────────────────────────────────── */
  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .lines {
    display: none;
  }

  .editor {
    width: 100%;
    height: 100%;
    padding: 12px 16px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: normal;
    user-select: text;
    -webkit-user-select: text;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
  }

  .editor div { margin-bottom: 4px; }


  .editor:empty::before {
    content: 'メモを入力…';
    color: var(--text-muted);
    pointer-events: none;
  }

  /* ── Markdown Preview ─────────────────────────────── */
  .markdown-view {
    display: none;
    position: absolute;
    inset: 0;
    padding: 12px 16px;
    overflow-y: auto;
    cursor: text;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    user-select: text;
    -webkit-user-select: text;
  }

  .markdown-view.active { display: block; }

  .md-placeholder { color: var(--text-muted); }
  .md-line, .md-empty { min-height: 21px; word-break: break-word; }
  .md-h1 { font-size: 17px; font-weight: 700; line-height: 1.4; margin: 4px 0 2px; }
  .md-h2 { font-size: 15px; font-weight: 600; line-height: 1.4; margin: 3px 0 1px; }
  .md-h3 { font-size: 14px; font-weight: 600; line-height: 1.4; margin: 2px 0 1px; }

  .md-bullet { position: relative; min-height: 21px; padding-left: 14px; }
  .md-bullet::before { content: '•'; position: absolute; left: 2px; }

  .md-check {
    position: relative;
    min-height: 21px;
    padding-left: 18px;
    word-break: break-word;
  }
  .md-check::before {
    content: '☐';
    position: absolute;
    left: 0;
    font-size: 1em;
  }
  .md-check.checked::before {
    content: '☑';
  }
  .md-check input[type="checkbox"] {
    position: absolute;
    left: 0;
    top: 0;
    width: 16px;
    height: 16px;
    opacity: 0;
    cursor: pointer;
    z-index: 1;
  }
  .md-check.checked span { text-decoration: line-through; opacity: 0.45; }

  .md-blockquote {
    border-left: 3px solid var(--text-muted);
    padding-left: 10px;
    color: var(--text-muted);
    min-height: 21px;
    word-break: break-word;
  }

  .md-hr {
    border: none;
    border-top: 1px solid var(--text-muted);
    margin: 6px 0;
  }

  .md-ordered {
    min-height: 21px;
    word-break: break-word;
  }
  .md-order-num {
    display: inline-block;
    min-width: 1.5em;
    text-align: right;
    margin-right: 4px;
    color: var(--text-muted);
  }

  .markdown-view code {
    background: rgba(0,0,0,0.06);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.9em;
  }

  .md-codeblock {
    background: rgba(0,0,0,0.06);
    border-radius: 6px;
    padding: 8px 12px;
    margin: 4px 0;
    overflow-x: auto;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    line-height: 1.4;
    white-space: pre;
  }
  .md-codeblock code {
    background: none;
    border-radius: 0;
    padding: 0;
    font-size: inherit;
  }

  .markdown-view a {
    color: #1565C0;
    text-decoration: underline;
    text-decoration-color: rgba(21, 101, 192, 0.4);
    cursor: pointer;
  }
  .markdown-view a:hover {
    text-decoration-color: rgba(21, 101, 192, 0.8);
  }

  /* ── Context Menu ──────────────────────────────────── */
  .context-menu {
    display: none;
    position: fixed;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 8px;
    padding: 4px 0;
    min-width: 180px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 0 0 0.5px rgba(0,0,0,0.1);
    z-index: 200;
    font-size: 13px;
    color: #222;
    -webkit-app-region: no-drag;
  }

  .context-menu.open { display: block; }

  .context-menu-item {
    display: flex;
    align-items: center;
    padding: 4px 12px;
    cursor: default;
    border-radius: 4px;
    margin: 0 4px;
    gap: 8px;
  }

  .context-menu-item:hover {
    background: #007AFF;
    color: #fff;
  }

  .context-menu-item .cm-icon {
    width: 20px;
    text-align: center;
    flex-shrink: 0;
    font-size: 12px;
    opacity: 0.7;
  }

  .context-menu-item:hover .cm-icon { opacity: 1; }

  .context-menu-separator {
    height: 1px;
    background: rgba(0,0,0,0.1);
    margin: 4px 0;
  }

  /* ── Resize Handle ────────────────────────────────── */
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .resize-handle:hover { opacity: 0.6; }

  .resize-handle::before,
  .resize-handle::after {
    content: '';
    position: absolute;
    background: var(--text);
    border-radius: 1px;
  }
  .resize-handle::before {
    width: 8px; height: 1.5px;
    bottom: 4px; right: 2px;
    transform: rotate(-45deg);
  }
  .resize-handle::after {
    width: 5px; height: 1.5px;
    bottom: 3px; right: 1px;
    transform: rotate(-45deg);
  }
</style>
</head>
<body>
  <div class="note" id="note">
    <!-- Titlebar -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-left">
        <button class="btn btn-close" id="btn-delete" title="Delete">
          <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
        </button>
      </div>
      <div class="titlebar-right">
        <button class="btn" id="btn-new" title="New Note">
          <svg viewBox="0 0 12 12"><line x1="6" y1="2" x2="6" y2="10"/><line x1="2" y1="6" x2="10" y2="6"/></svg>
        </button>
        <button class="btn" id="btn-color" title="Color">
          <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </div>

    <!-- Color Picker -->
    <div class="color-picker" id="color-picker">
      <div class="color-dot" data-color="yellow"></div>
      <div class="color-dot" data-color="blue"></div>
      <div class="color-dot" data-color="green"></div>
      <div class="color-dot" data-color="pink"></div>
      <div class="color-dot" data-color="purple"></div>
      <div class="color-dot" data-color="gray"></div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu">
      <div class="context-menu-item" data-action="cut"><span class="cm-icon">✂</span>切り取り</div>
      <div class="context-menu-item" data-action="copy"><span class="cm-icon">⎘</span>コピー</div>
      <div class="context-menu-item" data-action="paste"><span class="cm-icon">⎗</span>貼り付け</div>
      <div class="context-menu-item" data-action="selectAll"><span class="cm-icon">⌃A</span>全選択</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="newNote"><span class="cm-icon">＋</span>新しい付箋を作成</div>
      <div class="context-menu-item" data-action="deleteNote"><span class="cm-icon">✕</span>この付箋を削除</div>
      <div class="context-menu-item" data-action="openTrash"><span class="cm-icon">🗑</span>ゴミ箱を開く</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="zoomIn"><span class="cm-icon">＋</span>ズームイン</div>
      <div class="context-menu-item" data-action="zoomOut"><span class="cm-icon">−</span>ズームアウト</div>
      <div class="context-menu-item" data-action="zoomReset"><span class="cm-icon">1:1</span>ズームリセット</div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="lines" id="lines"></div>
      <div class="markdown-view" id="markdown-view"></div>
      <div class="editor" id="editor" contenteditable="true"></div>
    </div>
  </div>

<script>
  // ── Globals ───────────────────────────────────────
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;
  const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
  const appWindow = getCurrentWebviewWindow();

  const params = new URLSearchParams(window.location.search);
  const noteId = params.get('id');

  const editor    = document.getElementById('editor');
  const noteEl    = document.getElementById('note');
  const titlebar  = document.getElementById('titlebar');
  const picker    = document.getElementById('color-picker');
  const mdView    = document.getElementById('markdown-view');


  let saveTimer = null;
  let currentSettings = null;
  let rawContent = '';

  // ── Apply Color Theme ─────────────────────────────
  function applyColor(color) {
    noteEl.style.setProperty('--bg',  `var(--${color})`);
    noteEl.style.setProperty('--bar', `var(--${color}-bar)`);

    document.querySelectorAll('.color-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.color === color);
    });
  }

  // ── Load Note Data ────────────────────────────────
  async function loadNote() {
    const [note, settings] = await Promise.all([
      invoke('get_note', { id: noteId }),
      invoke('get_settings'),
    ]);
    if (!note) return;

    rawContent = note.content;
    editor.innerText = rawContent;
    applyColor(note.color);

    if (settings) {
      currentSettings = settings;
      const fs = settings.font_size;
      editor.style.fontSize = `${fs}px`;
      noteEl.style.opacity = (settings.opacity ?? 100) / 100;
    }
    // Apply per-note zoom
    currentZoom = note.zoom ?? 100;
    applyZoom(currentZoom);
    showPreview();
  }

  // ── Markdown ───────────────────────────────────────
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Note: inlineMarkdown receives escapeHtml-processed strings.
  // This is intentional — HTML entities (e.g. &amp;) are treated as plain text
  // within Markdown syntax, and code blocks store the escaped form as-is,
  // avoiding double-escaping when placed inside <code> tags.
  function inlineMarkdown(escaped) {
    // `code` → placeholder (protect from bold/italic/strikethrough)
    const codeBlocks = [];
    escaped = escaped.replace(/`([^`]+)`/g, (_, c) => {
      codeBlocks.push(c);
      return '\x00CODE' + (codeBlocks.length - 1) + '\x00';
    });
    // **bold** → <strong>
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // *italic* → <em> (after bold to avoid conflict)
    escaped = escaped.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // ~~strikethrough~~ → <del>
    escaped = escaped.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    // [text](url) → <a>
    escaped = escaped.replace(
      /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
      '<a href="$2" data-url="$2">$1</a>'
    );
    // Restore code blocks
    escaped = escaped.replace(/\x00CODE(\d+)\x00/g, (_, i) => '<code>' + codeBlocks[i] + '</code>');
    return escaped;
  }

  function renderMarkdown(text) {
    if (!text) return '<div class="md-placeholder">メモを入力…</div>';
    const lines = text.split('\n');
    const result = [];
    let inCodeBlock = false;
    let codeLines = [];
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!inCodeBlock && /^```\S*\s*$/.test(line)) {
        inCodeBlock = true;
        codeLines = [];
        continue;
      }
      if (inCodeBlock && /^```\s*$/.test(line)) {
        result.push('<pre class="md-codeblock"><code>' + codeLines.map(l => escapeHtml(l)).join('\n') + '</code></pre>');
        inCodeBlock = false;
        codeLines = [];
        continue;
      }
      if (inCodeBlock) {
        codeLines.push(line);
        continue;
      }
      if (/^[-*] \[x\] /i.test(line)) {
        result.push(`<div class="md-check checked"><input type="checkbox" checked data-line="${i}"><span>${inlineMarkdown(escapeHtml(line.slice(6)))}</span></div>`);
        continue;
      }
      if (/^[-*] \[ \] /.test(line)) {
        result.push(`<div class="md-check"><input type="checkbox" data-line="${i}"><span>${inlineMarkdown(escapeHtml(line.slice(6)))}</span></div>`);
        continue;
      }
      if (line.startsWith('### ')) {
        result.push(`<div class="md-h3">${inlineMarkdown(escapeHtml(line.slice(4)))}</div>`);
        continue;
      }
      if (line.startsWith('## ')) {
        result.push(`<div class="md-h2">${inlineMarkdown(escapeHtml(line.slice(3)))}</div>`);
        continue;
      }
      if (line.startsWith('# ')) {
        result.push(`<div class="md-h1">${inlineMarkdown(escapeHtml(line.slice(2)))}</div>`);
        continue;
      }
      if (/^([-*_])\s*(?:\1\s*){2,}$/.test(line)) {
        result.push('<hr class="md-hr">');
        continue;
      }
      if (/^[-*] /.test(line)) {
        result.push(`<div class="md-bullet">${inlineMarkdown(escapeHtml(line.slice(2)))}</div>`);
        continue;
      }
      if (/^> /.test(line)) {
        result.push(`<div class="md-blockquote">${inlineMarkdown(escapeHtml(line.slice(2)))}</div>`);
        continue;
      }
      if (/^\d+\. /.test(line)) {
        const m = line.match(/^(\d+)\. (.*)/);
        result.push(`<div class="md-ordered"><span class="md-order-num">${escapeHtml(m[1])}.</span> ${inlineMarkdown(escapeHtml(m[2]))}</div>`);
        continue;
      }
      if (line === '') {
        result.push('<div class="md-empty"></div>');
        continue;
      }
      result.push(`<div class="md-line">${inlineMarkdown(escapeHtml(line))}</div>`);
    }
    // Handle unclosed code block
    if (inCodeBlock) {
      result.push('<pre class="md-codeblock"><code>' + codeLines.map(l => escapeHtml(l)).join('\n') + '</code></pre>');
    }
    return result.join('');
  }

  function showPreview() {
    mdView.innerHTML = renderMarkdown(rawContent);
    mdView.classList.add('active');
    editor.style.display = 'none';
  }

  function showEditor(caretOffset) {
    mdView.classList.remove('active');
    editor.style.display = '';
    editor.focus();
    if (caretOffset != null) {
      try {
        // Walk text nodes to find the right position
        let remaining = caretOffset;
        const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          if (remaining <= node.textContent.length) {
            const sel = window.getSelection();
            const range = document.createRange();
            range.setStart(node, remaining);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
            return;
          }
          remaining -= node.textContent.length;
        }
      } catch (e) { /* fallback: cursor at start */ }
    }
  }

  const MD_PATTERNS = [
    /^#{1,3} /m,              // heading
    /^[-*] /m,                // bullet list
    /^> /m,                   // blockquote
    /^\d+\. /m,               // ordered list
    /^[-*_]{3,}$/m,           // horizontal rule
    /\*\*/,                   // bold (**)
    /(?<!\w)__[^\s_].*?__/,   // bold (__)
    /(?<![*\w])\*(?![\s*])/,  // italic
    /~~/,                     // strikethrough
    /`[^`]/,                  // inline code
    /!\[/,                    // image
    /\[.+?\]\(.+?\)/,        // link
  ];

  function hasMarkdownSyntax(text) {
    return MD_PATTERNS.some(r => r.test(text));
  }

  function getCaretOffsetFromEvent(e) {
    // Find which top-level child of mdView was clicked
    const children = Array.from(mdView.children);
    const target = e.target.closest('.markdown-view > *') || e.target;
    const lineIdx = children.indexOf(target);
    if (lineIdx < 0) return 0;
    // Sum lengths of rawContent lines up to lineIdx
    const lines = rawContent.split('\n');
    let offset = 0;
    for (let i = 0; i < Math.min(lineIdx, lines.length); i++) {
      offset += lines[i].length + 1; // +1 for \n
    }
    return offset;
  }

  // Click on preview: links/checkboxes handled, then edit mode logic
  mdView.addEventListener('click', (e) => {
    const link = e.target.closest('a[data-url]');
    if (link) {
      e.preventDefault();
      window.__TAURI__.shell.open(link.dataset.url);
      return;
    }
    if (e.target.closest('input[type="checkbox"]')) return;
    // Always single-click for empty/plain text notes
    if (!rawContent || !hasMarkdownSyntax(rawContent)) {
      showEditor(getCaretOffsetFromEvent(e));
      return;
    }
    // Markdown notes: single-click if setting enabled
    if (currentSettings?.edit_on_single_click) {
      showEditor(getCaretOffsetFromEvent(e));
    }
  });

  // Double-click on preview → edit mode (always works)
  mdView.addEventListener('dblclick', (e) => {
    if (!e.target.closest('input[type="checkbox"]') && !e.target.closest('a[data-url]')) {
      showEditor(getCaretOffsetFromEvent(e));
    }
  });

  // Blur textarea → preview mode
  editor.addEventListener('blur', (e) => {
    // Don't switch if focus moves to a button (color picker, etc.) or context menu is open
    if (e.relatedTarget && e.relatedTarget.closest('.note')) return;
    if (ctxMenu.classList.contains('open')) return;
    showPreview();
  });

  // Checkbox toggle
  mdView.addEventListener('change', (e) => {
    if (e.target.type !== 'checkbox') return;
    const lineIdx = parseInt(e.target.dataset.line, 10);
    const lines = rawContent.split('\n');
    if (e.target.checked) {
      lines[lineIdx] = lines[lineIdx].replace(/^([-*] )\[ \] /, '$1[x] ');
    } else {
      lines[lineIdx] = lines[lineIdx].replace(/^([-*] )\[x\] /i, '$1[ ] ');
    }
    rawContent = lines.join('\n');
    editor.innerText = rawContent;
    invoke('update_note_content', { id: noteId, content: rawContent });
    mdView.innerHTML = renderMarkdown(rawContent);
  });

  // ── Zoom ──────────────────────────────────────────
  function applyZoom(zoom) {
    document.body.style.zoom = zoom / 100;
  }

  let currentZoom = 100;

  async function changeZoom(delta) {
    const next = Math.max(50, Math.min(200, currentZoom + delta * 10));
    if (next === currentZoom) return;
    currentZoom = next;
    applyZoom(next);
    invoke('update_note_zoom', { id: noteId, zoom: next });
  }

  // ── Markdown auto-continue on Enter ─────────────
  const LIST_PATTERNS = [
    { re: /^(- \[[ xX]\] )(.*)$/, prefix: (m) => '- [ ] ' },     // checkbox
    { re: /^([-*] )(?!\[[ xX]\] )(.*)$/, prefix: (m) => m[1] },   // bullet
    { re: /^(\d+)\. (.*)$/,      prefix: (m) => `${+m[1] + 1}. ` }, // ordered
    { re: /^(> )(.*)$/,          prefix: (m) => '> ' },          // blockquote
  ];

  /**
   * Return the prefix to auto-insert on the next line, or null if
   * the line is not a list/quote that should be continued.
   */
  function getAutoPrefix(lineText) {
    for (const pat of LIST_PATTERNS) {
      const m = lineText.match(pat.re);
      if (m) return pat.prefix(m);
    }
    return null;
  }

  /**
   * Return true if the line is an empty list item / blockquote
   * (i.e. prefix only, no content) that should be cancelled on Enter.
   */
  function isEmptyListItem(lineText) {
    for (const pat of LIST_PATTERNS) {
      const m = lineText.match(pat.re);
      if (!m) continue;
      const content = m[2];
      return !content.trim();
    }
    return false;
  }

  function getCurrentLine() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return null;
    const range = sel.getRangeAt(0);
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE) return null;
    const full = node.textContent;
    const pos = range.startOffset;
    const before = full.slice(0, pos);
    const after = full.slice(pos);
    const lastNl = before.lastIndexOf('\n');
    const nextNl = after.indexOf('\n');
    const atEnd = nextNl === 0 || (nextNl === -1 && pos === full.length);
    return { text: before.slice(lastNl + 1), node, pos, atEnd };
  }

  let autoInsertGuard = false;
  editor.addEventListener('beforeinput', (e) => {
    if (e.inputType !== 'insertParagraph' || autoInsertGuard) return;

    const cur = getCurrentLine();
    if (!cur || !cur.atEnd) return;

    const prefix = getAutoPrefix(cur.text);
    if (prefix === null) return;

    e.preventDefault();
    autoInsertGuard = true;

    try {
      if (isEmptyListItem(cur.text)) {
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        range.setStart(cur.node, cur.pos - cur.text.length);
        range.deleteContents();
        document.execCommand('insertText', false, '\n');
      } else {
        document.execCommand('insertText', false, '\n' + prefix);
      }
    } finally {
      autoInsertGuard = false;
    }
  });

  // ── Paste: rich text links → markdown, otherwise plain ──
  function htmlToMarkdown(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    let result = '';
    for (const node of doc.body.childNodes) {
      result += nodeToMd(node);
    }
    return result;
  }

  function nodeToMd(node) {
    if (node.nodeType === Node.TEXT_NODE) return node.textContent;
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    const tag = node.tagName.toLowerCase();
    // Strip script/style tags entirely — their text content is never useful
    if (tag === 'script' || tag === 'style') return '';
    const inner = Array.from(node.childNodes).map(nodeToMd).join('');
    switch (tag) {
      case 'a': {
        const href = node.getAttribute('href') || '';
        if (!href || /^javascript:/i.test(href)) return inner;
        return `[${inner.trim() || href}](${href})`;
      }
      case 'strong': case 'b':  return inner ? `**${inner}**` : '';
      case 'em': case 'i':      return inner ? `*${inner}*` : '';
      case 'del': case 's':     return inner ? `~~${inner}~~` : '';
      case 'code':               return inner ? `\`${inner}\`` : '';
      case 'h1':                 return inner ? `# ${inner}\n` : '';
      case 'h2':                 return inner ? `## ${inner}\n` : '';
      case 'h3':                 return inner ? `### ${inner}\n` : '';
      case 'blockquote':         return inner ? inner.split('\n').filter(l => l).map(l => `> ${l}`).join('\n') + '\n' : '';
      case 'ul': case 'ol':     return inner;
      case 'li': {
        const parent = node.parentElement?.tagName.toLowerCase();
        if (parent === 'ol') {
          const idx = Array.from(node.parentElement.children).indexOf(node) + 1;
          return `${idx}. ${inner}\n`;
        }
        return `- ${inner}\n`;
      }
      case 'br':                 return '\n';
      case 'p': case 'div':     return inner + '\n';
      default:                   return inner;
    }
  }

  editor.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    const html = e.clipboardData.getData('text/html');
    const sel = window.getSelection();
    const selected = sel.toString();

    // 選択テキスト + URL → markdown link
    if (selected && /^https?:\/\/\S+$/.test(text.trim())) {
      document.execCommand('insertText', false, `[${selected}](${text.trim()})`);
      return;
    }

    // リッチテキストが含まれていれば markdown 変換
    if (html && /<(?:a|strong|b|em|i|del|s|code|h[1-3]|blockquote|[uo]l|li)\b/i.test(html)) {
      const md = htmlToMarkdown(html);
      document.execCommand('insertText', false, md);
      return;
    }

    // それ以外はプレーンテキスト
    document.execCommand('insertText', false, text);
  });

  // ── Auto-Save Content ─────────────────────────────
  editor.addEventListener('input', () => {
    rawContent = editor.innerText;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      invoke('update_note_content', { id: noteId, content: rawContent });
    }, 300);
  });

  // ── Drag Window ───────────────────────────────────
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.btn') || e.target.closest('.color-picker')) return;
    appWindow.startDragging();
  });

  // ── Save Position/Size on Move & Resize ───────────
  let geoTimer = null;
  async function saveGeometry() {
    clearTimeout(geoTimer);
    geoTimer = setTimeout(async () => {
      try {
        const pos  = await appWindow.outerPosition();
        const size = await appWindow.outerSize();
        invoke('update_note_geometry', {
          id: noteId,
          x: pos.x,
          y: pos.y,
          width: size.width,
          height: size.height,
        });
      } catch (e) {
        // Window might be closing
      }
    }, 500);
  }

  // Poll for geometry changes (Tauri v2 doesn't expose move/resize events easily)
  let lastPos = '', lastSize = '';
  setInterval(async () => {
    try {
      const pos  = await appWindow.outerPosition();
      const size = await appWindow.outerSize();
      const key = `${pos.x},${pos.y},${size.width},${size.height}`;
      if (key !== lastPos) {
        lastPos = key;
        saveGeometry();
      }
    } catch (e) {}
  }, 1000);

  // ── Buttons ───────────────────────────────────────
  document.getElementById('btn-new').addEventListener('click', () => {
    invoke('create_note');
  });

  document.getElementById('btn-delete').addEventListener('click', () => {
    invoke('delete_note', { id: noteId });
  });

  document.getElementById('btn-color').addEventListener('click', (e) => {
    e.stopPropagation();
    picker.classList.toggle('open');
  });

  // Color dots
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const color = dot.dataset.color;
      applyColor(color);
      invoke('update_note_color', { id: noteId, color });
      picker.classList.remove('open');
    });
  });

  // Close picker on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#color-picker') && !e.target.closest('#btn-color')) {
      picker.classList.remove('open');
    }
  });

  // ── Zoom Shortcuts (⌘+ / ⌘- / ⌘0) ───────────────
  function resetZoom() {
    currentZoom = 100;
    applyZoom(100);
    invoke('update_note_zoom', { id: noteId, zoom: 100 });
  }

  // Listen for zoom events from app menu (only apply to focused window)
  listen('zoom', (e) => {
    if (!document.hasFocus()) return;
    if (e.payload === 'in') changeZoom(+1);
    else if (e.payload === 'out') changeZoom(-1);
    else if (e.payload === 'reset') resetZoom();
  });

  // ── Listen for settings changes ──────────────────
  listen('settings-changed', (e) => {
    const s = e.payload;
    currentSettings = s;
    const fs = s.font_size;
    editor.style.fontSize = `${fs}px`;
    noteEl.style.opacity = (s.opacity ?? 100) / 100;
  });

  // ── Context Menu ─────────────────────────────────────
  const ctxMenu = document.getElementById('context-menu');
  let savedActiveElement = null;
  let savedSelection = null;

  function showContextMenu(x, y) {
    savedActiveElement = document.activeElement;
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      savedSelection = sel.getRangeAt(0).cloneRange();
    } else {
      savedSelection = null;
    }
    ctxMenu.classList.add('open');
    // Position first, then adjust for screen edges
    ctxMenu.style.left = `${x}px`;
    ctxMenu.style.top = `${y}px`;
    // Adjust if menu overflows viewport
    const rect = ctxMenu.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    if (rect.right > vw) ctxMenu.style.left = `${Math.max(0, x - rect.width)}px`;
    if (rect.bottom > vh) ctxMenu.style.top = `${Math.max(0, y - rect.height)}px`;
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('open');
  }

  document.addEventListener('contextmenu', (e) => {
    if (e.shiftKey) return;
    e.preventDefault();
    showContextMenu(e.clientX, e.clientY);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#context-menu')) {
      hideContextMenu();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideContextMenu();
  });

  function restoreFocusAndSelection() {
    if (savedActiveElement && savedActiveElement.isConnected) {
      savedActiveElement.focus();
    }
    if (savedSelection) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedSelection);
    }
  }

  ctxMenu.addEventListener('click', async (e) => {
    const item = e.target.closest('.context-menu-item');
    if (!item) return;
    const action = item.dataset.action;
    hideContextMenu();

    switch (action) {
      case 'cut': {
        restoreFocusAndSelection();
        const cutSel = window.getSelection();
        if (cutSel && cutSel.toString()) {
          try {
            await navigator.clipboard.writeText(cutSel.toString());
            cutSel.deleteFromDocument();
          } catch (_) {
            document.execCommand('cut');
          }
        }
        break;
      }
      case 'copy': {
        restoreFocusAndSelection();
        const copySel = window.getSelection();
        if (copySel && copySel.toString()) {
          try {
            await navigator.clipboard.writeText(copySel.toString());
          } catch (_) {
            document.execCommand('copy');
          }
        }
        break;
      }
      case 'paste':
        restoreFocusAndSelection();
        try {
          const text = await navigator.clipboard.readText();
          document.execCommand('insertText', false, text);
        } catch (_) {
          document.execCommand('paste');
        }
        break;
      case 'selectAll':
        restoreFocusAndSelection();
        document.execCommand('selectAll');
        break;
      case 'newNote':
        invoke('create_note');
        break;
      case 'deleteNote':
        invoke('delete_note', { id: noteId });
        break;
      case 'openTrash':
        invoke('open_trash');
        break;
      case 'zoomIn':
        changeZoom(+1);
        break;
      case 'zoomOut':
        changeZoom(-1);
        break;
      case 'zoomReset':
        resetZoom();
        break;
    }
  });

  // ── Expose for testing ──────────────────────────────
  window.htmlToMarkdown = htmlToMarkdown;
  window.hasMarkdownSyntax = hasMarkdownSyntax;
  window.getAutoPrefix = getAutoPrefix;
  window.isEmptyListItem = isEmptyListItem;
  window.renderMarkdown = renderMarkdown;

  // ── Init ──────────────────────────────────────────
  loadNote();
</script>
</body>
</html>
