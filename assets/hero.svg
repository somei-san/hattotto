<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" fill="none">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-sm" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ── Yellow Note (front) ─────────────────── -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="280" height="260" rx="8" fill="#FFF9C4"/>
    <!-- titlebar -->
    <rect x="60" y="40" width="280" height="32" rx="8" fill="#F9E97A"/>
    <rect x="60" y="56" width="280" height="16" fill="#F9E97A"/>
    <!-- left: close button -->
    <circle cx="82" cy="56" r="8" fill="rgba(0,0,0,0.06)"/>
    <line x1="79" y1="53" x2="85" y2="59" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="85" y1="53" x2="79" y2="59" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- right: new, pin, color buttons -->
    <circle cx="296" cy="56" r="8" fill="rgba(0,0,0,0.08)"/>
    <line x1="296" y1="52" x2="296" y2="60" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="292" y1="56" x2="300" y2="56" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="318" cy="56" r="8" fill="rgba(0,0,0,0.08)"/>
    <circle cx="318" cy="56" r="4" fill="#3E3A2E" opacity="0.6"/>
    <!-- content - markdown rendered -->
    <text x="80" y="100" font-size="16" font-weight="bold" font-family="-apple-system,sans-serif" fill="#3E3A2E">Welcome!</text>
    <text x="80" y="128" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">- Double-click to edit</text>
    <text x="80" y="150" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">- <tspan font-weight="bold">Bold</tspan> and <tspan font-style="italic">italic</tspan> supported</text>
    <text x="80" y="172" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">- Markdown preview</text>
    <!-- checkbox -->
    <rect x="80" y="187" width="14" height="14" rx="3" fill="none" stroke="#3E3A2E" stroke-width="1.5"/>
    <polyline points="83,194 87,198 93,190" stroke="#3E3A2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="100" y="199" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Checklist support</text>
    <rect x="80" y="210" width="14" height="14" rx="3" fill="none" stroke="rgba(62,58,46,0.4)" stroke-width="1.5"/>
    <text x="100" y="222" font-size="13" font-family="-apple-system,sans-serif" fill="rgba(62,58,46,0.5)">Click to toggle</text>
    <!-- blockquote -->
    <rect x="80" y="240" width="3" height="36" rx="1.5" fill="rgba(62,58,46,0.2)"/>
    <text x="92" y="254" font-size="12" font-family="-apple-system,sans-serif" fill="rgba(62,58,46,0.6)">Right-click for menu</text>
    <text x="92" y="270" font-size="12" font-family="-apple-system,sans-serif" fill="rgba(62,58,46,0.6)">New note</text>
  </g>

  <!-- ── Blue Note (behind, right) ───────────── -->
  <g filter="url(#shadow-sm)">
    <rect x="380" y="80" width="260" height="220" rx="8" fill="#BBDEFB"/>
    <rect x="380" y="80" width="260" height="32" rx="8" fill="#7FB3E0"/>
    <rect x="380" y="96" width="260" height="16" fill="#7FB3E0"/>
    <!-- left: close -->
    <circle cx="402" cy="96" r="8" fill="rgba(0,0,0,0.06)"/>
    <line x1="399" y1="93" x2="405" y2="99" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="405" y1="93" x2="399" y2="99" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- right: new, color -->
    <circle cx="596" cy="96" r="8" fill="rgba(0,0,0,0.08)"/>
    <line x1="596" y1="92" x2="596" y2="100" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="592" y1="96" x2="600" y2="96" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="618" cy="96" r="8" fill="rgba(0,0,0,0.08)"/>
    <circle cx="618" cy="96" r="4" fill="#3E3A2E" opacity="0.6"/>
    <!-- content -->
    <text x="400" y="140" font-size="15" font-weight="bold" font-family="-apple-system,sans-serif" fill="#3E3A2E">TODO</text>
    <rect x="400" y="153" width="14" height="14" rx="3" fill="none" stroke="#3E3A2E" stroke-width="1.5"/>
    <polyline points="403,160 407,164 413,156" stroke="#3E3A2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="420" y="165" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E" text-decoration="line-through">Design review</text>
    <rect x="400" y="176" width="14" height="14" rx="3" fill="none" stroke="rgba(62,58,46,0.4)" stroke-width="1.5"/>
    <text x="420" y="188" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Ship v1.0</text>
    <rect x="400" y="199" width="14" height="14" rx="3" fill="none" stroke="rgba(62,58,46,0.4)" stroke-width="1.5"/>
    <text x="420" y="211" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Write docs</text>
  </g>

  <!-- ── Pink Note (behind, bottom) ──────────── -->
  <g filter="url(#shadow-sm)">
    <rect x="200" y="260" width="240" height="140" rx="8" fill="#F8BBD0"/>
    <rect x="200" y="260" width="240" height="32" rx="8" fill="#E88FAB"/>
    <rect x="200" y="276" width="240" height="16" fill="#E88FAB"/>
    <!-- left: close -->
    <circle cx="222" cy="276" r="8" fill="rgba(0,0,0,0.06)"/>
    <line x1="219" y1="273" x2="225" y2="279" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="225" y1="273" x2="219" y2="279" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- right: new, color -->
    <circle cx="396" cy="276" r="8" fill="rgba(0,0,0,0.08)"/>
    <line x1="396" y1="272" x2="396" y2="280" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="392" y1="276" x2="400" y2="276" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="418" cy="276" r="8" fill="rgba(0,0,0,0.08)"/>
    <circle cx="418" cy="276" r="4" fill="#3E3A2E" opacity="0.6"/>
    <!-- content - editing mode feel -->
    <text x="220" y="318" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Meeting notes 3/20</text>
    <text x="220" y="340" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">- API design finalized</text>
    <text x="220" y="362" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">- Launch date: April 1st</text>
    <!-- cursor blink -->
    <rect x="379" y="351" width="1.5" height="15" rx="0.75" fill="#3E3A2E" opacity="0.7"/>
  </g>

  <!-- ── Green Note (small, top right) ───────── -->
  <g filter="url(#shadow-sm)">
    <rect x="540" y="20" width="160" height="100" rx="8" fill="#C8E6C9"/>
    <rect x="540" y="20" width="160" height="32" rx="8" fill="#8CC98F"/>
    <rect x="540" y="36" width="160" height="16" fill="#8CC98F"/>
    <!-- left: close -->
    <circle cx="562" cy="36" r="8" fill="rgba(0,0,0,0.06)"/>
    <line x1="559" y1="33" x2="565" y2="39" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="565" y1="33" x2="559" y2="39" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- right: new, color -->
    <circle cx="656" cy="36" r="8" fill="rgba(0,0,0,0.08)"/>
    <line x1="656" y1="32" x2="656" y2="40" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="652" y1="36" x2="660" y2="36" stroke="#3E3A2E" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="678" cy="36" r="8" fill="rgba(0,0,0,0.08)"/>
    <circle cx="678" cy="36" r="4" fill="#3E3A2E" opacity="0.6"/>
    <!-- content -->
    <text x="560" y="78" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Buy milk</text>
    <text x="560" y="98" font-size="13" font-family="-apple-system,sans-serif" fill="#3E3A2E">Call dentist</text>
  </g>

</svg>
